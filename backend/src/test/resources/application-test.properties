spring.datasource.url=jdbc:h2:mem:blog_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.jpa.show-sql=false
aliyun.oss.access-key-id=test
aliyun.oss.access-key-secret=test
aliyun.oss.bucket-name=test
aliyun.oss.cdn-domain=cdn.example.test
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
blog.comment.moderation.blocked-keywords=blockedword
blog.comment.moderation.max-links=2
blog.comment.moderation.auto-reject-blocked-keywords=true
