spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:blog_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

app.cors.allowed-origins=http://localhost:3000

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=300000

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

aliyun.oss.endpoint=${OSS_ENDPOINT:oss-cn-guangzhou.aliyuncs.com}
aliyun.oss.access-key-id=${OSS_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${OSS_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=${OSS_BUCKET_NAME:krismagic-images}
aliyun.oss.cdn-domain=${OSS_CDN_DOMAIN:cdn.magiccodelab.com}
aliyun.oss.region=${OSS_REGION:cn-guangzhou}

server.forward-headers-strategy=framework

blog.admin.username=${BLOG_ADMIN_USERNAME:}
blog.admin.password=${BLOG_ADMIN_PASSWORD:}

blog.comment.moderation.max-links=${BLOG_COMMENT_MODERATION_MAX_LINKS:2}
blog.comment.moderation.blocked-keywords=${BLOG_COMMENT_MODERATION_BLOCKED_KEYWORDS:}
blog.comment.moderation.auto-reject-blocked-keywords=${BLOG_COMMENT_MODERATION_AUTO_REJECT_BLOCKED_KEYWORDS:true}

management.info.env.enabled=true
info.app.name=sudo-make-me-a-website
info.app.version=v1
info.app.description=Personal blog backend API
