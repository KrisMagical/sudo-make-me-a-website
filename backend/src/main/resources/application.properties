spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/local_database
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

app.cors.allowed-origins=http://localhost:3000

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=300000

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

aliyun.oss.endpoint=${OSS_ENDPOINT:oss-cn-guangzhou.aliyuncs.com}
aliyun.oss.access-key-id=${OSS_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${OSS_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=${OSS_BUCKET_NAME:krismagic-images}
aliyun.oss.cdn-domain=${OSS_CDN_DOMAIN:cdn.magiccodelab.com}
aliyun.oss.region=${OSS_REGION:cn-guangzhou}
